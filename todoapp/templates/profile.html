{% extends "base.html" %}

{% block content %}

<div class="flex flex-col mt-5 items-center h-screen">

    <h1 class="text-shadow-lg text-5xl text-center">PROFILE</h1>

    <p class="text-shadow-lg text-2xl text-center">Welcome, {{ current_user.username }}!</p>

    <form method="POST" action="/profile" class="w-80 mt-5">
        {{ form.csrf_token }}

       
        <label class="input my-2">
        {{ form.username.label(class_="label") }}
        {{ form.username }}
        </label>

        <label class="input my-2">
        {{ form.email.label(class_="label") }} {{form.email }}
        </label>


    

        {{ form.submit(class_="btn btn-primary w-80") }}
    </form>
</div>


{% endblock content %}
