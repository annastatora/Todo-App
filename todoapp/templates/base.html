<!DOCTYPE html>
<html lang="en" data-theme="cyberpunk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask APP</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="static/css/app.css" rel="stylesheet" type="text/css" />
</head>

<body>

    <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
            </div>
        
         
            <a class="btn btn-ghost text-xl">TODO APP</a>
        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1">

            {%if current_user.is_authenticated %}
            <li><a href={{ url_for('tasks_view')}}>Tasks</a></li>
            {%endif%}
           
            <li><a href={{ url_for('about')}}>About</a></li>
            </ul>
        </div>
        <div class="navbar-end">
            {% if current_user.is_authenticated %}
            <a class="btn mx-2" href={{ url_for('profile')}}>Profile</a>
                <a class="btn mx-2" href={{ url_for('logout')}}>Logout</a>
            {% else %}
                <a class="btn mx-2" href={{ url_for('login')}}>Login</a>
                <a class="btn mx-2" href={{ url_for('register')}}>Register</a>
            {% endif %}
        </div>
    </div>
    {% block content %}{% endblock %}
</body>

</html>
